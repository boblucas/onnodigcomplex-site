    <text
       xml:space="preserve"
       style="font-style:normal;font-weight:normal;font-size:10.58329964px;line-height:1.10000002;font-family:sans-serif;opacity:0.95;fill:#ffffe6;fill-opacity:1;stroke:none;stroke-width:0.26458299"
       x="4.753499"
       y="39.052967"
       id="text1210"><tspan
         sodipodi:role="line"
         x="4.753499"
         y="39.052967"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1218">De KNNV (Koninklijke Nederlandse Natuurhistorische Vereniging) </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="50.694595"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1790">heeft ter ere van haar 120 jarig bestaan een mooie expositie over </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="62.336227"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1792">de wonderen der natuur. Een onderdeel daarvan was een </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="73.977859"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1794">fantastische stamboom van het leven met bij elke vertakking </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="85.619484"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1796">QR-codes. Dit zodat mensen van rijk tot phylum tot soort alles </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="97.261116"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1798">direct op kunnen zoeken. Helaas zijn de phylum QR-codes </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="108.90275"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1800">verloren gegaan in de post en bij de KNVB terecht gekomen </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="120.54437"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1802">(toegegeven, de afkortingen lijken ook op elkaar)! Maar te midden </tspan><tspan
         sodipodi:role="line"
         x="4.753499"
         y="132.186"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70277977px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.26458299"
         id="tspan1804">alle paniek om een oplossing te vinden horen we wat gepruttel…</tspan></text>
