         id="tspan78">ge<tspan
   style="fill:#1f7d45;fill-opacity:1"
   id="tspan1111">negen</tspan> <tspan
   style="fill:#c0392b;fill-opacity:1"
   id="tspan1101">tien</tspan>er<tspan
   style="fill:#1f7d45;fill-opacity:1"
   id="tspan1113">elf</tspan>jes <tspan
   style="fill:#c0392b;fill-opacity:1"
   id="tspan1103">twaalf</tspan> maal te veel.</tspan></text>
