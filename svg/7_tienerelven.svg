    <text
       xml:space="preserve"
       style="font-style:normal;font-weight:normal;font-size:10.5833px;line-height:1.1;font-family:sans-serif;fill:#ffffe6;fill-opacity:1;stroke:none;stroke-width:0.264583"
       x="5.3505044"
       y="19.851463"
       id="text1210"><tspan
         sodipodi:role="line"
         id="tspan1208"
         x="5.3505044"
         y="19.851463"
         style="fill:#ffffe6;fill-opacity:1;stroke-width:0.264583" /><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="31.493093"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1228">De elven van de kerstman hebben het maar druk. Zo maakt een </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="43.134724"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1234">groepje tieners  stapels zeven. Van hun manager, Quinten, moet </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="54.776352"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1250">er elke 2 uur eentje af zijn. Recentelijk heeft Quinten een mooie </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="66.417984"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1236">machine aangeschaft waardoor één elf wel 6 zeven per uur kan </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="78.059616"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1238">produceren. Ondanks dat de arme tieners dan meer tijd zouden </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="89.701241"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1242">hebben om een zakcentje bij te verdienen zijn ze toch te trots </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="101.34287"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1298">op  hun handwerk om dat zomaar te laten gebeuren. Want, </tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="112.9845"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan94">zegt één van de elven:</tspan><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="124.62613"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1214" /><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="136.26776"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1304" /><tspan
         sodipodi:role="line"
         x="5.3505044"
         y="147.90939"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:6.70278px;font-family:Ubuntu;-inkscape-font-specification:Ubuntu;fill:#ffffe6;fill-opacity:1;stroke-width:0.264583"
         id="tspan1218" /></text>
    <text
