<div class="chapter"><h2>Bi</h2><div class="poem">Oh ma en pa, m'n ex Bo is as. Ik ia nu: fa mi fa re mi do re re! At ei, ui en os, en zo op de po. Nu te op, ik eb af, om d'r as in de la&hellip;<br></div>
<p><em>&lsquo; fa mi fa re mi do re re </em> is de dies irea melodie, de dodenmis&rsquo;</p></div>
