<div class="chapter"><h2>Gegaggel</h2><div class="poem">Gadverdamme, g-gegaggel<br>
gorgelend gegiegaag, wrang!<br>
Gek zigzaggig tonggewaggel,<br>
gruisgeluid geeft galgendrang.<br>
