<div class="chapter"><h2>Alfabetacrostichon</h2><div class="poem">Alles blijft crisis,<br>
dus elke fout? Geert hoont iets!<br>
Jankerd knot leider<br>
met nul ongemak<br>

Púúr querulant, roept stoer<br>
temperingswilligheid...<br>
U vaak wreed xenofoob-<br>
yellende zak!<br>
<br></div></div>
