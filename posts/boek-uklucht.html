<div class="chapter"><h2>U-klucht</h2><div class="poem">Flutstulp nu lupusduur,<br>
duld fungusputluchtkuch,<br>
muntstukdruk, flutklusjuk,<br>
blut plus uw bul?<br>

Spulcultuursummum: uw<br>
huursurplusvruchtplukschurk!<br>
Slurpt bruut, uw munt gutst,<br>
hun VVD's gul!<br>
<br></div></div>
